services:
  web:
    image: nginx:1.30-alpine
    container_name: intranet_nginx
    ports:
      - "8080:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./public/admin:/admin:ro
      - ./public/manager:/manager:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: node:22-alpine
    container_name: intranet_backend
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TZ=America/Chicago
      - NODE_ENV=production
      - SESSION_SECRET=${SESSION_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - INITIAL_ADMIN_PASSWORD=${INITIAL_ADMIN_PASSWORD}
    volumes:
      - ./app:/app
      - ./uploads:/uploads
    command: sh -c "npm install && npm start"
    restart: unless-stopped

  prisma-studio:
    image: node:22-alpine
    container_name: intranet_prisma_studio
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./app:/app
    ports:
      - "5555:5555"
    command: sh -c "npm install && npx prisma studio --port 5555 --browser none"
    restart: unless-stopped
