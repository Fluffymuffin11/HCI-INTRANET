<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login – Heart Center Intranet</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, Arial, sans-serif;
      background: #f3f6f4;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 24px;
    }
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 64px;
      height: 64px;
      background: #0f5132;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      margin-bottom: 14px;
    }
    .brand h1 {
      margin: 0;
      font-size: 26px;
      color: #0f5132;
    }
    .brand p {
      margin: 6px 0 0;
      color: #6b7280;
      font-size: 14px;
    }
    .card {
      background: white;
      border-radius: 18px;
      padding: 36px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.07);
      border: 1px solid rgba(15,81,50,0.08);
    }
    .card h2 {
      margin: 0 0 24px;
      font-size: 20px;
      color: #111827;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 18px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #0f5132; }
    button {
      width: 100%;
      padding: 13px;
      background: #0f5132;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #0d4229; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .error {
      background: #fef2f2;
      color: #dc2626;
      border: 1px solid #fecaca;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 18px;
      display: none;
    }
    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #0f5132;
      font-size: 14px;
      text-decoration: none;
      font-weight: 600;
    }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-icon">❤</div>
      <h1>Heart Center</h1>
      <p>Admin Portal</p>
    </div>

    <div class="card">
      <h2>Sign In</h2>

      <div class="error" id="error-msg"></div>

      <form id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />

        <button type="submit" id="submit-btn">Sign In</button>
      </form>
    </div>

    <a href="/" class="back-link">← Back to Staff Intranet</a>
  </div>

  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("submit-btn");
      const err = document.getElementById("error-msg");
      err.style.display = "none";
      btn.disabled = true;
      btn.textContent = "Signing in...";

      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          err.textContent = data.error || "Login failed. Check your credentials.";
          err.style.display = "block";
          btn.disabled = false;
          btn.textContent = "Sign In";
          return;
        }

        const role = data.user?.role;
        if (role === "manager") {
          window.location.href = "/manager/index.html";
        } else {
          window.location.href = "/admin/dashboard.html";
        }
      } catch {
        err.textContent = "Unable to connect to server. Try again.";
        err.style.display = "block";
        btn.disabled = false;
        btn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
